<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Automating SOC Responses with Shuffle — Ethan Chertkov</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #060d09;
      --surface: #0a110d;
      --border: #142b1c;
      --cyan: #22ff7a;
      --green: #4dffaa;
      --text: #c9d8cf;
      --muted: #8aab96;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      line-height: 1.8;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(34,255,122,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34,255,122,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 4rem;
      background: rgba(6,13,9,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: var(--mono);
      color: var(--cyan);
      font-size: 0.95rem;
      text-decoration: none;
    }

    .nav-back {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.1em;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--cyan); }
    .nav-back::before { content: '← '; }

    main {
      position: relative;
      z-index: 1;
      max-width: 700px;
      margin: auto;
      padding: 8rem 2rem 2rem;
      text-align: center;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .wip-icon {
      font-size: 4rem;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeIn 0.6s 0.2s forwards;
    }

    h1 {
      font-family: var(--mono);
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 400;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeIn 0.6s 0.4s forwards;
    }

    h1 span { color: var(--cyan); }

    .wip-subtitle {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--cyan);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeIn 0.6s 0.6s forwards;
    }

    .wip-description {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 560px;
      margin: 0 auto 3rem;
      line-height: 1.8;
      opacity: 0;
      animation: fadeIn 0.6s 0.8s forwards;
    }

    .wip-status {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2rem;
      max-width: 480px;
      margin: 0 auto 3rem;
      opacity: 0;
      animation: fadeIn 0.6s 1s forwards;
    }

    .wip-status h3 {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--cyan);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .wip-status ul {
      list-style: none;
      padding: 0;
      text-align: left;
    }

    .wip-status li {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 0.8rem;
      padding-left: 1.5rem;
      position: relative;
    }

    .wip-status li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: var(--cyan);
    }

    .back-btn {
      font-family: var(--mono);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.75rem 1.8rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      transition: all 0.2s;
      display: inline-block;
      opacity: 0;
      animation: fadeIn 0.6s 1.2s forwards;
    }
    .back-btn:hover { border-color: var(--cyan); color: var(--cyan); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      nav { padding: 1rem 1.5rem; }
      main { padding: 0 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="../index.html" class="nav-logo">echkv ~</a>
    <a href="../index.html#projects" class="nav-back">Back to Projects</a>
  </nav>

  <main>
    <div class="wip-icon">🚧</div>
    <h1>Automating SOC Responses <span>with Shuffle</span></h1>
    <p class="wip-subtitle">// work in progress</p>
    
    <p class="wip-description">
      Currently building an automated Security Operations Center workflow using Shuffle for SOAR orchestration.
    </p>

    <a href="../index.html#projects" class="back-btn">← Back to Projects</a>
  </main>

  <footer>
    <p>Ethan Chertkov — echkv.github.io</p>
  </footer>

</body>
</html>
